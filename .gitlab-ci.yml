stages:
  - lint
  - test
  - build

include:
  - project: "omniverse/devplat/gitlab/templates/runners"
    file: "/modules/include.yml"
    ref: v2_latest

variables:
  IMAGE_NAME: $CI_REGISTRY_IMAGE

lint:
  extends: .omni_nvks_small_runner
  stage: lint
  image: python:3.13-slim
  before_script:
    - pip install --quiet uv
    - uv pip install --system --quiet ruff
  script:
    - ruff check gateway.py test_gateway.py test_docker.py
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH

test:
  extends: .omni_nvks_small_runner
  stage: test
  image: python:3.13-slim
  before_script:
    - pip install --quiet uv
    - uv pip install --system --quiet fastmcp httpx uvicorn pyyaml pytest pytest-asyncio
  script:
    - pytest test_gateway.py -v
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH

build-and-push:
  extends: .omni_nvks_small_runner
  stage: build
  image:
    name: gcr.io/kaniko-project/executor:v1.23.0-debug
    entrypoint: [""]
  before_script:
    - mkdir -p /kaniko/.docker
    - echo "{\"auths\":{\"$CI_REGISTRY\":{\"auth\":\"$(echo -n $CI_REGISTRY_USER:$CI_REGISTRY_PASSWORD | base64)\"}}}" > /kaniko/.docker/config.json
  script:
    - /kaniko/executor
      --context $CI_PROJECT_DIR
      --dockerfile $CI_PROJECT_DIR/Dockerfile
      --destination "$IMAGE_NAME:$CI_COMMIT_SHORT_SHA"
      --destination "$IMAGE_NAME:latest"
  rules:
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH
